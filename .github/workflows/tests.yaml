name: Install and test Python package

on:
  pull_request:
  push:
    branches:
      - main

# Cancel currently running job if a new one comes along for the same branch or tag.
# From https://stackoverflow.com/a/72408109.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  pre-commit:
    env:
        SKIP: 'pyright'
    name: Pre-commit checks
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: pre-commit/action@v3.0.1

  tests:
    name: Install and run tests
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
            os: [ubuntu-22.04, macos-14]
            editable: [true, false]
            python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true  # for the mgrid test data
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"
          cache: 'pip'
      - name: Install required packages for MacOS
        if: ${{ contains(matrix.os, 'macos') }}
        run: |
          brew install ninja libomp netcdf-cxx eigen lapack git
      - name: Install required packages for Ubuntu
        if: ${{ contains(matrix.os, 'ubuntu') }}
        run: |
          # install VMEC++ deps as well as VMEC2000 deps (we need to import VMEC2000 in a test)
          sudo apt-get update && sudo apt-get install -y build-essential cmake libnetcdf-dev liblapack-dev libomp-dev
      - name: Cache the VMEC2000 wheel
        if: ${{ matrix.os == 'ubuntu-22.04' && matrix.python-version == '3.10' }}
        uses: actions/cache@v4
        with:
          path: /tmp/vmec2000-wheel
          # Keyed on the pinned VMEC2000 source commit: rebuild only when it changes.
          key: vmec2000-728af8bd6c79-cp310-ubuntu22.04
      - name: Also install VMEC2000 (only on Ubuntu 22.04)
        if: ${{ matrix.os == 'ubuntu-22.04' && matrix.python-version == '3.10' }}
        run: |
          sudo apt-get install -y libopenmpi-dev libnetcdff-dev libscalapack-mpi-dev \
            libopenblas-dev ninja-build
          python -m pip install mpi4py
          if ! ls /tmp/vmec2000-wheel/vmec-*.whl >/dev/null 2>&1; then
            # Build with the SYSTEM cmake + ninja; do NOT pip-install the
            # cmake/ninja wheels (they shadow the system cmake that
            # scikit-build-core's editable vmecpp rebuild records).
            python -m pip install numpy scikit-build f90wrap setuptools wheel
            git clone https://github.com/hiddenSymmetries/VMEC2000.git /tmp/VMEC2000
            git -C /tmp/VMEC2000 checkout 728af8bd6c796b36a0aa85fe298e507791e57c6e
            cp /tmp/VMEC2000/cmake/machines/ubuntu.json /tmp/VMEC2000/cmake_config_file.json
            LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu \
              python -m pip wheel /tmp/VMEC2000 --no-build-isolation -w /tmp/vmec2000-wheel
          fi
          python -m pip install /tmp/vmec2000-wheel/vmec-*.whl
          # fail loudly here if the binding is still broken, not in the test step
          python -c "import vmec; print('VMEC2000 import OK')"
      - name: Install package
        run: |
          # on Ubuntu we would not need this, but on MacOS we need to point CMake to gfortran-14 and gcc-14
          export FC=$(which gfortran-14 || which gfortran)
          export CC=$(which gcc-14 || which gcc)
          if [[ ${{ contains(matrix.os, 'macos') }} == true ]]; then
            export OpenMP_ROOT=$(brew --prefix)/opt/libomp
          fi
          if [[ ${{ matrix.editable }} == true ]]; then
            python -m pip install -e .[test]
          else
            python -m pip install -v .[test]
          fi
      - name: Checkout large-tests inputs for the input-consistency test
        uses: actions/checkout@v4
        with:
          repository: proximafusion/vmecpp_large_cpp_tests
          path: src/vmecpp/cpp/vmecpp_large_cpp_tests
      - name: Test package
        run: python -m pytest tests/
      - name: Test docstring examples
        # All except for __main__.py because this crashes doctest.
        run: python -m doctest $(git ls-files src/ | grep '\.py$' | grep -v '/__main__.py$')

  examples:
    name: Run example scripts
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - name: Install required packages for Ubuntu
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential cmake libnetcdf-dev liblapack-dev libomp-dev
      - name: Install package
        run: python -m pip install .[test]
      - name: Test example scripts
        run: |
          set -ex
          # Scripts that require unavailable external assets or optional dependencies.
          SKIP="compare_vmecpp_to_parvmec.py mpi_finite_difference.py simsopt_qh_fixed_resolution.py visualize_magnetic_field.py"
          export MPLBACKEND=Agg OMP_NUM_THREADS=1
          for script in examples/*.py; do
            name=$(basename "$script")
            if echo "$SKIP" | grep -qw "$name"; then
              echo "SKIP $script"
              continue
            fi
            echo "RUN $script"
            python "$script"
          done
