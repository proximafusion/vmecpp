name: Python Type Checking

on:
  pull_request:
  push:
    branches:
      - main

# Cancel currently running job if a new one comes along for the same branch or tag.
# From https://stackoverflow.com/a/72408109.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    name: Pyright type check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          cache: 'pip'
          python-version: '3.10'
      - name: Install dependencies
        run: sudo apt-get install build-essential cmake libnetcdf-dev liblapack-dev libopenmpi-dev libhdf5-dev python3-dev
      # Parse the dependencies from the pyproject.toml file and install them,
      # without installing and building the entire vmecpp project
      - run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install .

      - run: echo "$PWD/.venv/bin" >> $GITHUB_PATH
      - uses: jakebailey/pyright-action@v2
        with:
            version: 1.1.396
            verify-types: vmecpp
